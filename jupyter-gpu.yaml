apiVersion: v1
kind: Pod
metadata:
  name: jupyter-gpu
spec:
  restartPolicy: Never
  containers:
    - name: jupyter
      image: pytorch/pytorch:2.5.1-cuda12.1-cudnn9-runtime
      command: ["/bin/bash", "-lc"]
      args:
        - |
          pip install -U pip
          pip install jupyterlab snntorch torchvision torchaudio numpy matplotlib tqdm scikit-learn ultralytics opencv-python pycocotools
          jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      ports:
        - containerPort: 8888
      resources:
        requests:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: 1
        limits:
          cpu: "4"
          memory: "16Gi"
          nvidia.com/gpu: 1